<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Anthony Gargoua</title>
    
    <!-- Google Fonts Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

<header>
    <div class="nav-container">
        <!-- Le burger pour le mobile -->
        <div class="burger">
            <span></span><span></span><span></span>
        </div>
        
        <a href="index.html" class="nav-logo">
            <img src="img/logo.webp" alt="Logo">
        </a>

        <nav>
            <a href="index.html">Accueil</a>
            <a href="presentation.html">Présentation</a>
            <a href="competences.html">Compétences</a>
            <a href="projets.html">Projets</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>

        <button id="theme-toggle">🌑</button>
    </div>
</header>

<main class="content">
    <section class="contact-section fade">
        <h1 class="title">Me contacter ✍🏼</h1>
        <p class="subtitle">Une question ou un projet ? N'hésitez pas à m'envoyer un message via le formulaire ci-dessous.</p>

        <form class="contact-form" action="https://formspree.io/f/mdkrrqwg" method="POST">
            <div class="form-group">
                <input type="text" name="name" placeholder="Nom" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <textarea name="message" placeholder="Votre message..." rows="5" required></textarea>
            </div>

            <button type="submit" class="btn-submit">Envoyer</button>

            <!-- Message dynamique de retour -->
            <div id="form-message" class="form-message"></div>
        </form>
    </section>
</main>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<!-- Logique du formulaire -->
<script>
    const form = document.querySelector(".contact-form");
    const msgBox = document.getElementById("form-message");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        msgBox.classList.remove("success", "error", "show");

        const response = await fetch(form.action, {
            method: "POST",
            body: new FormData(form),
            headers: { "Accept": "application/json" }
        });

        if (response.ok) {
            msgBox.textContent = "Merci ! Votre message a bien été envoyé ✨";
            msgBox.className = "form-message success show";
            form.reset();
        } else {
            msgBox.textContent = "Erreur lors de l’envoi. Veuillez réessayer.";
            msgBox.className = "form-message error show";
        }

        gsap.fromTo(".show", 
            { opacity: 0, y: 10 }, 
            { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" }
        );
    });
</script>

<script src="js/script.js"></script>

</body>
</html>
