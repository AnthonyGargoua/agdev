<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compétences | Anthony Gargoua</title>
    
    <!-- Google Fonts Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>

<header>
    <div class="nav-container">
        <!-- Le burger pour le mobile -->
        <div class="burger">
            <span></span><span></span><span></span>
        </div>
        
        <a href="index.html" class="nav-logo">
            <img src="img/logo.webp" alt="Logo">
        </a>

        <nav>
            <a href="index.html">Accueil</a>
            <a href="presentation.html">Présentation</a>
            <a href="competences.html" class="active">Compétences</a>
            <a href="projets.html">Projets</a>
            <a href="contact.html">Contact</a>
        </nav>

        <button id="theme-toggle">🌑</button>
    </div>
</header>

<main class="content">
    <h1 class="title fade">Compétences 🎓</h1>

    <div class="skills-grid">
        <!-- Groupe Développement -->
        <section class="skill-category">
            <h3><i class="fas fa-code"></i> Développement Web</h3>
            <div class="skill-box">
                <div class="skill-info">
                    <span><i class="fab fa-html5"></i> HTML / CSS</span>
                    <span>80%</span>
                </div>
                <div class="progress-line"><span style="width: 80%;"></span></div>
            </div>
            <div class="skill-box">
                <div class="skill-info">
                    <span><i class="fab fa-js"></i> JavaScript</span>
                    <span>40%</span>
                </div>
                <div class="progress-line"><span style="width: 40%;"></span></div>
            </div>
            <div class="skill-box">
                <div class="skill-info">
                    <span><i class="fab fa-php"></i> PHP</span>
                    <span>30%</span>
                </div>
                <div class="progress-line"><span style="width: 30%;"></span></div>
            </div>
            <div class="skill-box">
                <div class="skill-info">
                    <span><i class="fab fa-python"></i> Python</span>
                    <span>10%</span>
                </div>
                <div class="progress-line"><span style="width: 10%;"></span></div>
            </div>
        </section>

        <!-- Groupe CMS -->
        <section class="skill-category">
            <h3><i class="fas fa-layer-group"></i> CMS & E-commerce</h3>
            <div class="skill-box">
                <div class="skill-info">
                    <span><i class="fab fa-wordpress"></i> WordPress</span>
                    <span>85%</span>
                </div>
                <div class="progress-line"><span style="width: 85%;"></span></div>
            </div>
            <div class="skill-box">
                <div class="skill-info">
                    <span><i class="fab fa-shopify"></i> PrestaShop / Shopify</span>
                    <span>70%</span>
                </div>
                <div class="progress-line"><span style="width: 70%;"></span></div>
            </div>
        </section>

        <!-- Groupe Design -->
        <section class="skill-category">
            <h3><i class="fas fa-pen-nib"></i> Design & UI/UX</h3>
            <div class="skill-box">
                <div class="skill-info">
                    <span><i class="fab fa-figma"></i> Figma</span>
                    <span>70%</span>
                </div>
                <div class="progress-line"><span style="width: 70%;"></span></div>
            </div>
            <div class="skill-box">
                <div class="skill-info">
                    <span><i class="fas fa-palette"></i> Suite Adobe</span>
                    <span>75%</span>
                </div>
                <div class="progress-line"><span style="width: 75%;"></span></div>
            </div>
        </section>
    </div>
</main>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="js/script.js"></script>

</body>
</html>
